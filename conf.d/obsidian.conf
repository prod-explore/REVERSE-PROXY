server {
    listen 80;
    server_name obsidian.futumore.pl;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name obsidian.futumore.pl;

    client_max_body_size 50M;

    ssl_certificate     /etc/letsencrypt/live/obsidian.futumore.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/obsidian.futumore.pl/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/obsidian.futumore.pl/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── MCP Server (Streamable HTTP / SSE) ───────────────────────────────────
    # Proxies to our custom Node.js MCP server
    location /mcp/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $mcp_server http://obsidian-mcp:3000;

        rewrite ^/mcp/(.*)$ /mcp/$1 break;
        proxy_pass $mcp_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # SSE needs buffering off and long timeouts
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward authorization header for token check
        proxy_set_header Authorization $http_authorization;
    }

    # ── CouchDB LiveSync ────────────────────────────────────────────────────
    location / {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend http://obsidian-couchdb:5984;

        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
