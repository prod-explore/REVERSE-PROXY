
server {
    listen 80;
    server_name cloud.hypnagogia.pl;

    location / {
        return 301 https://$host$request_uri;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
}

server {
    listen 80;
    server_name studio.hypnagogia.pl;

    location / {
        return 301 https://$host$request_uri;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
}



server {
    listen 443 ssl;
    server_name cloud.hypnagogia.pl;

    client_max_body_size 5G;

    ssl_certificate     /etc/letsencrypt/live/cloud.hypnagogia.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloud.hypnagogia.pl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $cloudp http://filebrowser:80;
        proxy_pass $cloudp;

        proxy_connect_timeout 5s;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name studio.hypnagogia.pl;

    ssl_certificate     /etc/letsencrypt/live/studio.hypnagogia.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studio.hypnagogia.pl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $studio http://studio.hypnagogia:3000;
        proxy_pass $studio;

        proxy_connect_timeout 5s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
}
