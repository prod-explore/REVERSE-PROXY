server {
    listen 80;
    server_name blackbook.futumore.pl;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name blackbook.futumore.pl;

    ssl_certificate     /etc/letsencrypt/live/blackbook.futumore.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blackbook.futumore.pl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $blackbook_web http://blackbook_web:3001;
        proxy_pass $blackbook_web;

        proxy_connect_timeout 5s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $blackbook_api http://blackbook_api:3000;
        proxy_pass $blackbook_api;

        proxy_connect_timeout 5s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
}
