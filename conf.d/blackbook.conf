server {
    listen 80;
    server_name blackbook.futumore.pl;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# DO ODKOMENTOWANIA PO WYGENEROWANIU CERTYFIKATU (certbot certonly --webroot...)
server {
    listen 443 ssl;
    server_name blackbook.futumore.pl;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/blackbook.futumore.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blackbook.futumore.pl/privkey.pem;
    
    # Opcjonalnie: include /etc/letsencrypt/options-ssl-nginx.conf;
    # Opcjonalnie: ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://blackbook_api:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
